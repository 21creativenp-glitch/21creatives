<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>21 Creatives</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      font-weight: bold;
      transition: background 1s, color 1s, text-shadow 1s;
    }
    .day {
      background: white;
      color: black;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .night {
      background: black;
      color: white;
      text-shadow: 2px 2px 8px rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <section class="day" id="hero">
    21 CREATIVES
  </section>
  <section class="night" id="moon">
    WELCOME TO THE MOON
  </section>
</body>
</html>
